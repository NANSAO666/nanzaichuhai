<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>南崽出海 · 赴一场江海浪漫</title>
<!-- ========== Tailwind CSS via CDN ========== -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- ========== Google Fonts ========== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    colors: { deepsea:'#004A7C', gold:'#D4AF37', orange:'#FF7E00', seagrad:'#E8F1F8' },
    fontFamily: { serif:['"Noto Serif SC"','serif'], sans:['"Noto Sans SC"','sans-serif'] }
  }}
}
</script>
<style>
:root{--deepsea:#004A7C;--gold:#D4AF37;--orange:#FF7E00;--seagrad:#E8F1F8;--shadow-soft:0 8px 30px rgba(0,74,124,.08);--shadow-hover:0 16px 40px rgba(0,74,124,.16)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Noto Sans SC",sans-serif;background:linear-gradient(180deg,#fff 0%,var(--seagrad) 100%);min-height:100vh;color:#1a2a3a;padding-bottom:70px}
.font-serif-display{font-family:"Noto Serif SC",serif}
.card-soft{box-shadow:var(--shadow-soft);transition:all .3s ease;border-radius:16px}
.card-soft:hover{box-shadow:var(--shadow-hover);transform:translateY(-4px)}
.btn-primary{background:linear-gradient(135deg,#004A7C,#0066a8);color:#fff;border:1px solid rgba(212,175,55,.5);transition:all .25s}
.btn-primary:active{transform:scale(.98)}
.btn-orange{background:linear-gradient(135deg,#FF7E00,#ff9933);color:#fff;transition:all .25s}
.btn-orange:active{transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,#D4AF37,#e6c558);color:#3a2e00;transition:all .25s}
.input-soft{border:1px solid #d6e2ec;border-radius:10px;padding:11px 14px;background:#fff;width:100%;font-size:15px}
.input-soft:focus{outline:none;border-color:var(--deepsea);box-shadow:0 0 0 3px rgba(0,74,124,.12)}
.skeleton{background:linear-gradient(90deg,#eef4f9 25%,#dde8f0 37%,#eef4f9 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 50%}100%{background-position:0 50%}}
.yacht-loader{display:inline-block;animation:yachtSail 2s ease-in-out infinite}
@keyframes yachtSail{0%,100%{transform:translateX(-6px) rotate(-3deg)}50%{transform:translateX(6px) rotate(3deg)}}
.fade-in{animation:fadeIn .35s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tab-active{color:var(--deepsea)}
.tab-active .tab-icon{transform:translateY(-2px) scale(1.1)}
.tab-icon{transition:all .25s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#bcd0de;border-radius:3px}
.toast-in{animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
/* 轮播 */
.carousel-track{transition:transform .5s ease}
.dot-active{background:var(--gold)!important;width:20px!important}
/* 联系条悬浮 */
.contact-bar{box-shadow:0 -4px 20px rgba(0,74,124,.1)}
</style>
</head>
<body>

<!-- ============================================================
     精致游艇 LOGO SVG 定义(全局复用)
============================================================ -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="iconYacht" viewBox="0 0 100 100">
      <!-- 太阳光芒 -->
      <g stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" fill="none">
        <line x1="50" y1="5" x2="50" y2="13"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(18 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(36 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(54 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(72 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(90 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(108 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(126 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(144 50 20)"/>
        <line x1="50" y1="5" x2="50" y2="13" transform="rotate(162 50 20)"/>
        <path d="M22 26 A 32 32 0 0 1 78 26" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
      </g>
      <!-- 游艇船体 -->
      <g fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 62 Q 14 68 26 68 L 78 68 Q 88 68 92 62 L 86 58 L 14 58 Z" fill="#004A7C" stroke="#D4AF37"/>
        <path d="M14 58 L 22 48 L 72 48 L 86 58" />
        <path d="M28 48 L 32 40 L 62 40 L 66 48" />
        <path d="M36 40 L 40 34 L 56 34 L 58 40" />
        <line x1="46" y1="34" x2="46" y2="20"/>
        <line x1="54" y1="34" x2="54" y2="22"/>
        <circle cx="46" cy="19" r="1.5" fill="#D4AF37"/>
        <circle cx="54" cy="21" r="1.2" fill="#D4AF37"/>
        <circle cx="28" cy="63" r="1.8" fill="#D4AF37"/>
        <circle cx="38" cy="63" r="1.8" fill="#D4AF37"/>
        <circle cx="48" cy="63" r="1.8" fill="#D4AF37"/>
        <circle cx="58" cy="63" r="1.8" fill="#D4AF37"/>
        <circle cx="68" cy="63" r="1.8" fill="#D4AF37"/>
        <path d="M88 58 L 92 56 Q 94 54 92 52 L 90 51"/>
      </g>
      <!-- 海浪 -->
      <g fill="none" stroke="#87CEEB" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 74 Q 12 70 22 74 T 42 74 T 62 74 T 82 74 T 100 74" opacity="0.8"/>
        <path d="M2 79 Q 16 75 30 79 T 58 79 T 86 79 T 100 79" stroke="#D4AF37" opacity="0.6"/>
        <path d="M2 84 Q 10 81 20 84 T 40 84 T 60 84 T 80 84 T 100 84" opacity="0.5"/>
      </g>
    </symbol>
  </defs>
</svg>

<!-- ============================================================
     顶部品牌栏(固定)
============================================================ -->
<header class="sticky top-0 z-30 backdrop-blur-md bg-white/85 border-b border-gray-100">
  <div class="flex items-center justify-between px-4 py-2.5">
    <div class="flex items-center gap-2.5">
      <!-- 精致游艇圆形LOGO -->
      <div class="relative flex-shrink-0 w-10 h-10 rounded-full bg-gradient-to-br from-deepsea to-deepsea/80 flex items-center justify-center shadow-md">
        <svg class="w-8 h-8"><use href="#iconYacht"/></svg>
        <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full bg-gold flex items-center justify-center text-[7px] font-bold text-deepsea leading-none">南</div>
      </div>
      <div>
        <h1 id="topBrand" class="font-serif-display text-base font-bold text-deepsea leading-tight">南崽出海</h1>
        <p id="topSlogan" class="text-[10px] text-gray-500">赴一场江海浪漫</p>
      </div>
    </div>
    <button onclick="ManualModule.openViewer()" class="flex items-center gap-1 text-xs text-deepsea bg-seagrad px-3 py-1.5 rounded-full">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
      使用帮助
    </button>
  </div>
</header>

<!-- ============================================================
     主内容区(按 Tab 切换)
============================================================ -->
<main id="appMain" class="max-w-md mx-auto px-4 py-4"></main>

<!-- ============================================================
     底部 Tab 导航(固定)
============================================================ -->
<nav class="fixed bottom-0 left-0 right-0 z-30 bg-white/95 backdrop-blur-md border-t border-gray-100 contact-bar">
  <div class="max-w-md mx-auto grid grid-cols-5">
    <button onclick="App.switchTab('home')" data-tab="home" class="tab-btn tab-active flex flex-col items-center py-2 text-[11px] text-gray-500">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/></svg>首页
    </button>
    <button onclick="App.switchTab('clubs')" data-tab="clubs" class="tab-btn flex flex-col items-center py-2 text-[11px] text-gray-500">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4M3 7v10l9 4 9-4V7M3 7l9 4 9-4M12 11v10"/></svg>码头
    </button>
    <button onclick="App.switchTab('ai')" data-tab="ai" class="tab-btn flex flex-col items-center py-2 text-[11px] text-gray-500">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>客服
    </button>
    <button onclick="App.switchTab('booking')" data-tab="booking" class="tab-btn flex flex-col items-center py-2 text-[11px] text-gray-500">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>预约
    </button>
    <button onclick="App.switchTab('mine')" data-tab="mine" class="tab-btn flex flex-col items-center py-2 text-[11px] text-gray-500">
      <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>我的
    </button>
  </div>
</nav>

<!-- Toast / Modal 容器 -->
<div id="toastBox" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 space-y-2 w-[90%] max-w-xs"></div>
<div id="modalRoot"></div>

<script>
/* ============================================================
   南崽出海 客户前端 主脚本 (模块化分层 · 中文注释完整)
   读取后台同步至 LocalStorage 的配置,渲染图文/价格/规则
============================================================ */

/* ============================================================
   模块一:StorageModule 本地存储层(与后台共用键名)
============================================================ */
const StorageModule = {
  KEYS:{BRAND:'nzch_brand',CLUBS:'nzch_clubs',AI:'nzch_ai_config',WEBHOOK:'nzch_webhook',MANUAL:'nzch_manual',ORDERS:'nzch_orders',VERSION:'nzch_version'},
  get(key,fallback){try{const r=localStorage.getItem(key);return r?JSON.parse(r):fallback}catch(e){return fallback}},
  loadBrand(){return this.get(this.KEYS.BRAND,null)},
  loadClubs(){return this.get(this.KEYS.CLUBS,[])},
  loadAI(){return this.get(this.KEYS.AI,null)},
  loadWebhook(){
    const raw = this.get(this.KEYS.WEBHOOK, null);
    if(!raw) return {url:'', useProxy:true};
    if(typeof raw === 'string') return {url:raw, useProxy:true};
    return raw;
  },
  loadManual(){return this.get(this.KEYS.MANUAL,[])},
  loadOrders(){return this.get(this.KEYS.ORDERS,[])},
  saveOrders(o){try{localStorage.setItem(this.KEYS.ORDERS,JSON.stringify(o));return true}catch(e){return false}},
};

/* ============================================================
   模块二:UI 通用工具层
============================================================ */
const UI = {
  toast(msg,type='info'){
    const colors={success:'bg-green-600',error:'bg-red-500',info:'bg-deepsea',warn:'bg-orange'};
    const icon=type==='success'?'✓':type==='error'?'✕':type==='warn'?'!':'i';
    const el=document.createElement('div');
    el.className=`toast-in ${colors[type]||colors.info} text-white px-4 py-2.5 rounded-xl shadow-lg text-sm flex items-center gap-2`;
    el.innerHTML=`<span class="font-bold w-5 h-5 rounded-full bg-white/25 flex items-center justify-center text-xs">${icon}</span><span>${msg}</span>`;
    document.getElementById('toastBox').appendChild(el);
    setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},2600);
  },
  modal(title,bodyHtml,full=false){
    const root=document.getElementById('modalRoot');
    root.innerHTML=`<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm" id="modalMask">
      <div class="bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl w-full ${full?'max-w-md h-[90vh]':'max-w-md max-h-[85vh]'} overflow-hidden flex flex-col fade-in">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100 sticky top-0 bg-white z-10">
          <h3 class="font-serif-display text-base font-bold text-deepsea">${title}</h3>
          <button onclick="UI.closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none w-8 h-8 flex items-center justify-center">&times;</button>
        </div>
        <div class="overflow-y-auto flex-1" id="modalBody">${bodyHtml}</div>
      </div>
    </div>`;
    document.getElementById('modalMask').addEventListener('click',e=>{if(e.target.id==='modalMask')this.closeModal()});
  },
  closeModal(){document.getElementById('modalRoot').innerHTML=''},
  loader(text='加载中'){return `<div class="flex flex-col items-center justify-center py-10"><svg width="70" height="70" viewBox="0 0 64 64" class="yacht-loader"><path d="M8 44 Q12 50 20 50 L44 50 Q52 50 56 44 Z" fill="#004A7C"/><path d="M16 44 L20 30 L40 30 L44 44" fill="none" stroke="#D4AF37" stroke-width="2"/><path d="M30 30 L30 18 L42 28 L30 28" fill="none" stroke="#004A7C" stroke-width="2"/><path d="M6 52 Q16 56 32 56 T58 52" fill="none" stroke="#004A7C" stroke-width="1.5" opacity=".5"/></svg><p class="text-sm text-gray-500 mt-3">${text}...</p></div>`},
  // 默认游艇占位图(图片损坏时替换)
  defaultYachtSvg:'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23E8F1F8" width="100" height="100"/><path d="M8 62 Q 14 68 26 68 L 78 68 Q 88 68 92 62 L 86 58 L 14 58 Z" fill="%23004A7C" stroke="%23D4AF37" stroke-width="1.8"/><path d="M14 58 L 22 48 L 72 48 L 86 58" fill="none" stroke="%23D4AF37" stroke-width="1.8"/><path d="M28 48 L 32 40 L 62 40 L 66 48" fill="none" stroke="%23D4AF37" stroke-width="1.8"/><circle cx="28" cy="63" r="1.8" fill="%23D4AF37"/><circle cx="48" cy="63" r="1.8" fill="%23D4AF37"/><circle cx="68" cy="63" r="1.8" fill="%23D4AF37"/><path d="M2 74 Q 12 70 22 74 T 42 74 T 62 74 T 82 74 T 100 74" fill="none" stroke="%2387CEEB" stroke-width="1.5" opacity="0.7"/></svg>',
  onImgErr(img){img.onerror=null;img.src=this.defaultYachtSvg}
};

/* ============================================================
   模块三:App 主控模块(Tab 路由 + 顶部品牌信息)
============================================================ */
const App = {
  currentTab:'home',
  switchTab(tab){
    this.currentTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>{
      b.classList.toggle('tab-active',b.dataset.tab===tab);
    });
    const main=document.getElementById('appMain');
    main.classList.remove('fade-in');void main.offsetWidth;main.classList.add('fade-in');
    window.scrollTo(0,0);
    const map={home:HomeModule,clubs:ClubsModule,ai:AIModule,booking:BookingModule,mine:MineModule};
    const mod=map[tab]||map.home;
    mod.render();
  },
  // 刷新顶部品牌信息
  refreshBrand(){
    const b=StorageModule.loadBrand();
    if(b){
      document.getElementById('topBrand').textContent=b.brandName;
      document.getElementById('topSlogan').textContent=b.slogan;
    }
  }
};

/* ============================================================
   模块四:HomeModule 品牌首页
   Hero大图 + 品牌简介 + 五大码头封面网格 + 底部联系条
============================================================ */
const HomeModule = {
  render(){
    const b=StorageModule.loadBrand()||{};
    const clubs=StorageModule.loadClubs().filter(c=>c.active);
    const heroBg=b.brandImage?`style="background-image:url('${b.brandImage}');background-size:cover;background-position:center"`:'';
    const clubCards=clubs.map(c=>{
      const cover=c.images.find(i=>i.cover)||c.images[0];
      return `<div onclick="ClubsModule.openDetail('${c.id}')" class="card-soft bg-white overflow-hidden cursor-pointer">
        <div class="h-36 bg-seagrad relative overflow-hidden">
          ${cover?`<img src="${cover.base64}" class="w-full h-full object-cover" onerror="UI.onImgErr(this)"/>`:`<div class="w-full h-full flex items-center justify-center"><svg width="56" height="56"><use href="#iconYacht"/></svg></div>`}
          <span class="absolute top-2 left-2 text-[10px] px-2 py-0.5 rounded-full bg-gold text-deepsea font-semibold">${c.area}</span>
        </div>
        <div class="p-3">
          <h3 class="font-serif-display font-bold text-deepsea">${c.name}</h3>
          <p class="text-xs text-gray-500 mt-1 line-clamp-2">${c.intro}</p>
          <div class="flex items-center justify-between mt-2">
            <span class="text-xs text-orange font-semibold">¥${c.pricing[0]?.price||0}起</span>
            <span class="text-xs text-deepsea">查看详情 →</span>
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('appMain').innerHTML=`
      <!-- Hero 大图区 -->
      <div class="relative rounded-2xl overflow-hidden h-48 mb-4 ${b.brandImage?'':'bg-gradient-to-br from-deepsea to-deepsea/70'}" ${heroBg}>
        <div class="absolute inset-0 bg-gradient-to-t from-deepsea/80 via-deepsea/20 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4 text-white">
          <div class="flex items-center gap-2 mb-1">
            <div class="w-8 h-8 rounded-full bg-gold/20 flex items-center justify-center">
              <svg width="22" height="22"><use href="#iconYacht"/></svg>
            </div>
            <h2 class="font-serif-display text-2xl font-bold">${b.brandName||'南崽出海'}</h2>
          </div>
          <p class="text-sm text-gold font-medium">${b.slogan||'赴一场江海浪漫'}</p>
        </div>
      </div>

      <!-- 品牌简介 -->
      <div class="card-soft bg-white p-4 mb-4">
        <div class="flex items-center gap-2 mb-2">
          <span class="w-1 h-4 bg-gold rounded"></span>
          <h3 class="font-serif-display font-bold text-deepsea">关于${b.brandName||'南崽出海'}</h3>
        </div>
        <p class="text-sm text-gray-600 leading-relaxed">${b.intro||''}</p>
        <div class="grid grid-cols-3 gap-2 mt-3 text-center">
          <div class="bg-seagrad rounded-lg py-2"><div class="text-base font-bold text-deepsea">${clubs.length}</div><div class="text-[10px] text-gray-500">合作码头</div></div>
          <div class="bg-seagrad rounded-lg py-2"><div class="text-base font-bold text-deepsea">${b.businessHours||'9-21'}</div><div class="text-[10px] text-gray-500">营业时间</div></div>
          <div class="bg-seagrad rounded-lg py-2"><div class="text-base font-bold text-deepsea">3h</div><div class="text-[10px] text-gray-500">标准出海</div></div>
        </div>
      </div>

      <!-- 五大码头封面网格 -->
      <div class="mb-4">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="w-1 h-4 bg-gold rounded"></span>
            <h3 class="font-serif-display font-bold text-deepsea">精选码头</h3>
          </div>
          <button onclick="App.switchTab('clubs')" class="text-xs text-orange">全部 →</button>
        </div>
        <div class="grid grid-cols-2 gap-3">${clubCards}</div>
      </div>

      <!-- 快捷入口 -->
      <div class="grid grid-cols-3 gap-3 mb-4">
        <button onclick="App.switchTab('ai')" class="card-soft bg-white p-3 flex flex-col items-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#004A7C" stroke-width="1.8"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
          <span class="text-xs mt-1 text-gray-600">客户服务</span>
        </button>
        <button onclick="App.switchTab('ai')" class="card-soft bg-white p-3 flex flex-col items-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FF7E00" stroke-width="1.8"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 3v-3z"/></svg>
          <span class="text-xs mt-1 text-gray-600">AI问答</span>
        </button>
        <button onclick="App.switchTab('booking')" class="card-soft bg-white p-3 flex flex-col items-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span class="text-xs mt-1 text-gray-600">立即预约</span>
        </button>
      </div>

      <!-- 底部联系条 -->
      ${this.contactBar(b)}
    `;
  },
  // 底部固定联系方式(全局绑定微信DaogoG/电话13003192344)
  contactBar(b){

  carouselTimer:null,
  carouselIdx:0,
  startCarousel(total){

const QuoteModule = {
  state:{clubId:null,boatIdx:0,addons:{},hours:3},

    const selectedAddons=Object.keys(this.state.addons).filter(k=>this.state.addons[k]);
    const addonTotal=selectedAddons.reduce((s,k)=>s+c.addons.find(a=>a.name===k).price,0);
    const extraHours=Math.max(0,this.state.hours-3);
    const overtime=extraHours*(b.overtimeRate||500);

    const body=`

                <input type="radio" name="boat" ${i===this.state.boatIdx?'checked':''} onchange="QuoteModule.setBoat(${i})" class="text-deepsea"/>

              </div>
              <span class="text-sm font-bold text-orange">¥${p.price}</span>
            </label>`).join('')}</div>
        </div>

        <div>
          <div class="text-sm font-semibold text-deepsea mb-2">增值服务(可多选)</div>
          <div class="space-y-1.5">${c.addons.map(a=>`
            <label class="flex items-center justify-between bg-white border border-gray-200 rounded-lg px-3 py-2.5 cursor-pointer">
              <div class="flex items-center gap-2">
                <input type="checkbox" ${this.state.addons[a.name]?'checked':''} onchange="QuoteModule.toggleAddon('${a.name}',this.checked)" class="text-orange"/>

              </div>
              <span class="text-sm text-orange">+¥${a.price}</span>

        </div>

        <div>
          <div class="text-sm font-semibold text-deepsea mb-2">出海时长(标准3小时)</div>
          <div class="flex items-center gap-3">
            <button onclick="QuoteModule.setHours(${this.state.hours-1})" class="w-10 h-10 rounded-lg bg-gray-100 text-xl">-</button>
            <div class="flex-1 text-center bg-white border border-gray-200 rounded-lg py-2.5"><span class="text-lg font-bold text-deepsea">${this.state.hours}</span> 小时</div>
            <button onclick="QuoteModule.setHours(${this.state.hours+1})" class="w-10 h-10 rounded-lg bg-gray-100 text-xl">+</button>
          </div>

        </div>

        <div class="bg-white border border-gold/30 rounded-xl p-3">
          <div class="text-sm font-semibold text-deepsea mb-2">报价明细单</div>
          <div class="space-y-1 text-xs">
            <div class="flex justify-between"><span class="text-gray-600">${boat.size} · 3小时</span><span>¥${boat.price}</span></div>

      </div>`;
    document.getElementById('modalBody').innerHTML=body;
  },

    const clubs=StorageModule.loadClubs();

    const sysPrompt=(cfg.systemPrompt||'')+`\n\n【当前商家信息】\n微信:${brand.wechat}\n电话:${brand.phone}\n营业时间:${brand.businessHours}\n\n【五大码头实时数据】\n`+clubs.map(c=>`${c.name}(${c.area}):${c.intro} 起价${c.pricing[0]?.price}元,时段${c.timeSlots.join('/')}`).join('\n');
    this.chatHistory.push({role:'user',content:userMessage});
    let res;
    try{
      res=await fetch(cfg.apiUrl,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.apiKey}`},
        body:JSON.stringify({model:cfg.model,messages:[{role:'system',content:sysPrompt},...this.chatHistory.slice(-8)],max_tokens:800,temperature:0.7})
      });
    }catch(e){throw new Error('网络异常,请检查网络连接')}
    if(!res.ok){
      if(res.status===401)throw new Error('密钥失效(401),请联系商家配置');
      if(res.status===429)throw new Error('请求过快(429),请稍后再试');
      if(res.status===400)throw new Error('请求参数错误或token超限,请缩短问题');
      throw new Error(`请求失败(${res.status})`);
    }
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'暂无回复';
    this.chatHistory.push({role:'assistant',content:reply});
    return reply;
  },

/* ============================================================
   模块八:BookingModule 在线预约表单
   必填校验 → 写台账 → Webhook推送 → 成功弹窗
============================================================ */
const BookingModule = {
  form:{clubId:'',boatSize:'',bookingDate:'',timeSlot:'',pax:'',addons:[],customerName:'',customerPhone:'',remark:''},
  render(){

    const c=this.form.clubId?clubs.find(x=>x.id===this.form.clubId):null;
    const boatOpts=c?`<option value="">请选择船型</option>`+c.pricing.map(p=>`<option value="${p.size}" ${this.form.boatSize===p.size?'selected':''}>${p.size} · ¥${p.price}</option>`).join(''):`<option value="">请先选择码头</option>`;
    const slotOpts=c?`<option value="">请选择时段</option>`+c.timeSlots.map(t=>`<option value="${t}" ${this.form.timeSlot===t?'selected':''}>${t}</option>`).join(''):`<option value="">请先选择码头</option>`;
    const addonBoxes=c?c.addons.map(a=>`<label class="flex items-center justify-between bg-white border border-gray-200 rounded-lg px-3 py-2 cursor-pointer"><div class="flex items-center gap-2"><input type="checkbox" value="${a.name}" ${this.form.addons.includes(a.name)?'checked':''} onchange="BookingModule.syncAddons()" class="text-orange"/><span class="text-sm">${a.name}</span></div><span class="text-xs text-orange">+¥${a.price}</span></label>`).join(''):'';

    document.getElementById('appMain').innerHTML=`
      <div class="mb-4">
        <h2 class="font-serif-display text-xl font-bold text-deepsea mb-1">在线预约</h2>
        <p class="text-xs text-gray-500">提交后商家微信/电话将快速联系您确认档期</p>
      </div>
      <div class="card-soft bg-white p-4 space-y-4">
        <div>
          <label class="text-sm font-medium text-deepsea">选择码头 <span class="text-red-500">*</span></label>
          <select id="fClub" class="input-soft mt-1" onchange="BookingModule.onClubChange(this.value)">${clubSel}</select>
        </div>
        <div>
          <label class="text-sm font-medium text-deepsea">选择船型 <span class="text-red-500">*</span></label>
          <select id="fBoat" class="input-soft mt-1" onchange="BookingModule.form.boatSize=this.value">${boatOpts}</select>
        </div>
        <div><label class="text-sm font-medium text-deepsea">出海日期 <span class="text-red-500">*</span></label><input id="fDate" type="date" class="input-soft mt-1" value="${this.form.bookingDate}" onchange="BookingModule.form.bookingDate=this.value"/></div>
        <div><label class="text-sm font-medium text-deepsea">时段 <span class="text-red-500">*</span></label><select id="fSlot" class="input-soft mt-1" onchange="BookingModule.form.timeSlot=this.value">${slotOpts}</select></div>
        <div><label class="text-sm font-medium text-deepsea">出行人数 <span class="text-red-500">*</span></label><input id="fPax" type="number" min="1" class="input-soft mt-1" value="${this.form.pax}" onchange="BookingModule.form.pax=this.value" placeholder="如 8"/></div>
        ${addonBoxes?`<div><label class="text-sm font-medium text-deepsea">增值服务(可多选)</label><div class="space-y-1.5 mt-1">${addonBoxes}</div></div>`:''}
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-sm font-medium text-deepsea">姓名 <span class="text-red-500">*</span></label><input id="fName" class="input-soft mt-1" value="${this.form.customerName}" onchange="BookingModule.form.customerName=this.value" placeholder="您的称呼"/></div>
          <div><label class="text-sm font-medium text-deepsea">手机号 <span class="text-red-500">*</span></label><input id="fPhone" type="tel" class="input-soft mt-1" value="${this.form.customerPhone}" onchange="BookingModule.form.customerPhone=this.value" placeholder="11位手机号"/></div>
        </div>
        <div><label class="text-sm font-medium text-deepsea">出行备注</label><textarea id="fRemark" rows="2" class="input-soft mt-1" onchange="BookingModule.form.remark=this.value" placeholder="如求婚布置、商务接待需求等">${this.form.remark}</textarea></div>
        <button onclick="BookingModule.submit()" class="btn-orange w-full py-3 rounded-xl font-medium text-base">提交预约</button>
      </div>`;
  },
  onClubChange(clubId){
    this.form.clubId=clubId;
    this.form.boatSize='';
    this.form.timeSlot='';
    this.form.addons=[];
    this.render();
  },
  syncAddons(){
    this.form.addons=Array.from(document.querySelectorAll('#appMain input[type=checkbox]:checked')).map(c=>c.value);
  },
  // 从码头详情/报价预填
  prefill(clubId,boatSize,addons,hours){
    this.form={clubId,boatSize:boatSize||'',bookingDate:'',timeSlot:'',pax:'',addons:addons||[],customerName:'',customerPhone:'',remark:hours&&hours>3?`预计出海${hours}小时`:''};
    App.switchTab('booking');
    UI.toast('已为您预选码头与船型','success');
  },
  // 校验+提交
  async submit(){
    // 必填校验
    const f=this.form;
    if(!f.clubId){UI.toast('请选择码头','error');return}
    if(!f.boatSize){UI.toast('请选择船型','error');return}
    if(!f.bookingDate){UI.toast('请选择出海日期','error');return}
    if(!f.timeSlot){UI.toast('请选择时段','error');return}
    if(!f.pax||f.pax<1){UI.toast('请填写出行人数','error');return}
    if(!f.customerName.trim()){UI.toast('请填写姓名','error');return}
    if(!/^1\d{10}$/.test(f.customerPhone)){UI.toast('请填写正确的11位手机号','error');return}

    const clubs=StorageModule.loadClubs();
    const c=clubs.find(x=>x.id===f.clubId);
    const brand=StorageModule.loadBrand()||{};
    const orderId=this.genOrderId();
    const order={
      orderId,clubId:c.id,clubName:c.name,clubAddress:c.address,
      boatSize:f.boatSize,bookingDate:f.bookingDate,timeSlot:f.timeSlot,
      pax:f.pax,addons:f.addons,customerName:f.customerName.trim(),
      customerPhone:f.customerPhone,remark:f.remark.trim(),
      status:'pending',createdAt:new Date().toISOString()
    };
    // 写入订单台账
    const orders=StorageModule.loadOrders();
    orders.push(order);
    StorageModule.saveOrders(orders);
    // Webhook推送(异步,失败静默)
    this.pushWebhook(order,brand);
    // 成功弹窗
    this.showSuccess(orderId,brand);
  },
  // 生成订单号 NZC+yyyyMMddHHmmss+随机
  genOrderId(){
    const d=new Date();
    const p=n=>String(n).padStart(2,'0');
    const rand=Math.random().toString(36).slice(2,6).toUpperCase();
    return `NZC${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}${rand}`;
  },
  // 消息推送(PushPlus/企业微信)
  async pushWebhook(order,brand){
    const cfg=StorageModule.loadWebhook();
    if(!cfg)return;
    const type=cfg.type||'pushplus';
    const title='【南崽出海】新游艇预约通知';
    const content=`【南崽出海·新游艇预约通知】
订单编号：${order.orderId}
预约码头：${order.clubName}
码头地址：${order.clubAddress}
客户姓名：${order.customerName}
联系电话：${order.customerPhone}
选定游艇：${order.boatSize}
出海日期&时段：${order.bookingDate} ${order.timeSlot}
出行人数：${order.pax}
增值配套：${(order.addons||[]).join('、')||'无'}
客户出行备注：${order.remark||'无'}
商家对接：微信${brand.wechat} / 电话${brand.phone}
提交时间：${new Date(order.createdAt).toLocaleString('zh-CN')}
请尽快联系客户确认档期！`;
    try{
      if(type==='pushplus' && cfg.token){
        await fetch('https://www.pushplus.plus/send',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({token:cfg.token,title:title,content:content,template:'txt'})
        });
      }else if(type==='wecom' && cfg.url){
        const body=JSON.stringify({msgtype:'text',text:{content}});
        if(cfg.useProxy){
          await fetch('https://api.allorigins.win/post?url='+encodeURIComponent(cfg.url),{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body
          });
        }else{
          await fetch(cfg.url,{method:'POST',headers:{'Content-Type':'application/json'},body});
        }
      }
    }catch(e){console.warn('推送失败',e)}
  },
  // 成功弹窗
  showSuccess(orderId,brand){
    UI.modal('预约提交成功', `
      <div class="p-6 text-center">
        <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-3">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h3 class="font-serif-display text-lg font-bold text-deepsea mb-1">预约已提交!</h3>
        <p class="text-sm text-gray-500 mb-3">您的订单编号</p>
        <div class="bg-seagrad rounded-xl py-3 px-4 font-mono text-deepsea font-bold text-lg tracking-wider mb-4">${orderId}</div>
        <div class="bg-orange/5 border border-orange/20 rounded-xl p-3 text-left">
          <p class="text-sm text-gray-700 mb-2">商家将快速联系您确认档期,您也可主动联系:</p>
          <div class="space-y-1.5">
            <a href="javascript:void(0)" onclick="UI.toast('请长按复制: ${brand.wechat}','info')" class="flex items-center gap-2 text-sm text-deepsea"><svg width="18" height="18" viewBox="0 0 24 24" fill="#D4AF37"><path d="M8.5 8.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm6 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM12 2C6.48 2 2 5.94 2 10.5c0 2.5 1.4 4.74 3.6 6.24L4 21l4.5-2.4c1.1.3 2.3.4 3.5.4 5.52 0 10-3.94 10-8.5S17.52 2 12 2z"/></svg>微信:<span class="text-gold font-semibold">${brand.wechat}</span></a>
            <a href="tel:${brand.phone}" class="flex items-center gap-2 text-sm text-deepsea"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.81.36 1.6.7 2.34a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.74-1.27a2 2 0 012.11-.45c.74.34 1.53.57 2.34.7A2 2 0 0122 16.92z"/></svg>电话:<span class="text-gold font-semibold">${brand.phone}</span></a>
          </div>
        </div>
      </div>`,
      `<button onclick="UI.closeModal();BookingModule.reset()" class="btn-primary w-full py-2.5 rounded-xl font-medium">好的</button>`);
  },
  reset(){
    this.form={clubId:'',boatSize:'',bookingDate:'',timeSlot:'',pax:'',addons:[],customerName:'',customerPhone:'',remark:''};
    this.render();
  }
};
