/* ========== 全局 CSS 变量与基础样式 ========== */

.card-soft:hover{box-shadow:var(--shadow-hover);}

}

.btn-gold:hover{transform:scale(1.03);}
/* 输入框统一样式 */
.input-soft{

}
.input-soft:focus{outline:none;border-color:var(--deepsea);box-shadow:0 0 0 3px rgba(0,74,124,.12);}
/* 骨架屏 shimmer */

}

  0%,100%{transform:translateX(-6px) rotate(-3deg)}
  50%{transform:translateX(6px) rotate(3deg)}
}
/* 模块切换淡入 */

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.nav-item.active{
  background:linear-gradient(135deg,rgba(0,74,124,.12),rgba(212,175,55,.08));
  color:var(--deepsea);border-left:3px solid var(--gold);font-weight:600;
}
/* 滚动条美化 */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#bcd0de;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
/* 图片墙封面金边 */

/* 状态徽章 */

.badge-done{background:#D1FAE5;color:#065F46}
.badge-cancel{background:#FEE2E2;color:#991B1B}
/* Toast 动画 */
.toast-in{animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
/* ========== 移动端适配 ========== */
.sidebar-open{transform:translateX(0)!important;}
.sidebar-overlay{display:none;}
.sidebar-overlay.active{display:block;}
@media (max-width: 768px){
  .admin-content{padding-left:0!important;padding-right:0!important;}
}

<script>
/* ============================================================
   ███████ ██████  ███████ ███    ██  ██████  ██████   ██████
   ██      ██   ██ ██      ████   ██ ██    ██ ██   ██ ██    ██
   ███████ ██████  █████   ██ ██  ██ ██    ██ ██████  ██    ██
        ██ ██      ██      ██  ██ ██ ██    ██ ██   ██ ██    ██
   ███████ ██      ███████ ██   ████  ██████  ██   ██  ██████
   南崽出海 管理员后台 主脚本 (模块化分层 · 中文注释完整)
============================================================ */

/* ============================================================
   模块一:StorageModule 本地存储层
   统一管理 LocalStorage 读写,分层键隔离,JSON 序列化
============================================================ */
const StorageModule = {
  KEYS: {
    BRAND: 'nzch_brand',
    CLUBS: 'nzch_clubs',
    AI: 'nzch_ai_config',
    WEBHOOK: 'nzch_webhook',
    MANUAL: 'nzch_manual',
    ORDERS: 'nzch_orders',
    VERSION: 'nzch_version',
  },
  // 通用读取(失败返回 fallback)
  get(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){
      console.warn('[Storage] 读取失败', key, e);
      return fallback;
    }
  },
  // 通用写入
  set(key, value){
    try{
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    }catch(e){
      // 容量超限兜底提示(图片 Base64 可能撑爆 5MB)
      UI.toast('存储空间不足,请精简图片素材后重试','error');
      console.error('[Storage] 写入失败', key, e);
      return false;
    }
  },
  // 单键删除
  remove(key){ localStorage.removeItem(key); },

  // ===== 业务封装 =====
  loadBrand(){ return this.get(this.KEYS.BRAND, null); },
  saveBrand(b){ return this.set(this.KEYS.BRAND, b); },

  loadClubs(){ return this.get(this.KEYS.CLUBS, null); },
  saveClubs(c){ return this.set(this.KEYS.CLUBS, c); },

  loadAI(){ return this.get(this.KEYS.AI, null); },
  saveAI(a){ return this.set(this.KEYS.AI, a); },

  loadWebhook(){
    const raw = this.get(this.KEYS.WEBHOOK, null);
    if(!raw) return {url:'', useProxy:true};
    if(typeof raw === 'string') return {url:raw, useProxy:true};
    return raw;
  },
  saveWebhook(w){ return this.set(this.KEYS.WEBHOOK, w); },

  loadManual(){ return this.get(this.KEYS.MANUAL, null); },
  saveManual(m){ return this.set(this.KEYS.MANUAL, m); },

  loadOrders(){ return this.get(this.KEYS.ORDERS, []); },
  saveOrders(o){ return this.set(this.KEYS.ORDERS, o); },

  getVersion(){ return this.get(this.KEYS.VERSION, 1); },
  bumpVersion(){ const v = this.getVersion() + 1; this.set(this.KEYS.VERSION, v); return v; },
};

/* ============================================================
   模块二:ServerModule 服务器通信层
   统一管理与后端API的通信,自动检测后端是否可用
============================================================ */
const ServerModule = {
  baseUrl: '',
  available: false,

  async init(){
    try{
      const res = await fetch('/api/config');
      if(res.ok){
        const data = await res.json();
        this.available = true;
        if(data.brand) StorageModule.saveBrand(data.brand);
        if(data.clubs) StorageModule.saveClubs(data.clubs);
        if(data.ai) {
          const localAi = StorageModule.loadAI() || {};
          StorageModule.saveAI({ ...data.ai, apiKey: localAi.apiKey || data.ai.apiKey || '' });
        }
        if(data.manual) StorageModule.saveManual(data.manual);
        if(data.webhook) {
          const localWh = StorageModule.loadWebhook() || {};
          StorageModule.saveWebhook({ ...localWh, ...data.webhook });
        }
        console.log('[Server] 后端服务已连接,配置已同步');
        return true;
      }
    }catch(e){
      console.log('[Server] 无后端服务,使用本地模式');
    }
    this.available = false;
    return false;
  },

  async save(endpoint, data){
    if(!this.available) return true;
    try{
      const res = await fetch(`/api/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      return result.success !== false;
    }catch(e){
      console.warn('[Server] 保存失败', endpoint, e);
      return false;
    }
  },

  async saveBrand(b){ return this.save('brand', b); },
  async saveClubs(c){ return this.save('clubs', c); },
  async saveAI(a){ return this.save('ai', a); },
  async saveWebhook(w){ return this.save('webhook', w); },
  async saveManual(m){ return this.save('manual', m); },

  async loadOrders(){
    if(!this.available) return StorageModule.loadOrders();
    try{
      const res = await fetch('/api/orders');
      const data = await res.json();
      StorageModule.saveOrders(data);
      return data;
    }catch(e){
      return StorageModule.loadOrders();
    }
  },

  async createOrder(order){
    if(!this.available) {
      const orders = StorageModule.loadOrders() || [];
      orders.push(order);
      StorageModule.saveOrders(orders);
      return { success: true, orderId: order.orderId };
    }
    try{
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      return await res.json();
    }catch(e){
      return { success: false, error: e.message };
    }
  },

  async updateOrderStatus(orderId, status){
    if(!this.available) {
      const orders = StorageModule.loadOrders() || [];
      const order = orders.find(o => o.orderId === orderId);
      if(order){ order.status = status; StorageModule.saveOrders(orders); }
      return { success: true };
    }
    try{
      const res = await fetch(`/api/orders/${orderId}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      return await res.json();
    }catch(e){
      return { success: false, error: e.message };
    }
  },

  async pushTest(){
    if(!this.available) return { success: false, error: '无后端服务' };
    try{
      const res = await fetch('/api/push/test', { method: 'POST' });
      return await res.json();
    }catch(e){
      return { success: false, error: e.message };
    }
  },

  async pushOrder(order){
    if(!this.available) return { success: false };
    try{
      const res = await fetch('/api/push/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      return await res.json();
    }catch(e){
      return { success: false, error: e.message };
    }
  },

  async aiChat(messages){
    if(!this.available) return { success: false, error: '无后端服务' };
    try{
      const res = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      return await res.json();
    }catch(e){
      return { success: false, error: e.message };
    }
  },
};

/* ============================================================
   CloudModule uniCloud云端同步模块
   通过uniCloud HTTP API (clientDB) 直接调用,无需SDK
============================================================ */
const CloudModule = {
  available: false,
  spaceId: '',
  clientSecret: '',
  endpoint: 'https://api.next.bspapp.com',
  configDocId: '',

  async init(){
    const savedSpaceId = StorageModule.get('nzch_space_id', '');
    const savedSecret = StorageModule.get('nzch_client_secret', '');
    if(savedSpaceId && savedSecret){
      return await this.connect(savedSpaceId, savedSecret);
    }
    // 默认配置
    const defaultSpaceId = 'mp-be8bb2ea-2253-4636-aef9-ad4968f829d4';
    const defaultSecret = 'bfodIRJzAUJ/DJU5N1+XAg==';
    return await this.connect(defaultSpaceId, defaultSecret);
  },

  async connect(spaceId, clientSecret){
    try{
      this.spaceId = spaceId;
      this.clientSecret = clientSecret;
      StorageModule.set('nzch_space_id', spaceId);
      StorageModule.set('nzch_client_secret', clientSecret);
      
      // 测试连接 - 查询配置表
      const res = await this.query('nzch_config', {}, 1);
      this.available = true;
      console.log('[Cloud] uniCloud 连接成功');
      
      // 同步配置
      await this.syncConfigFromCloud();
      return true;
    }catch(e){
      console.warn('[Cloud] 连接失败', e);
      this.available = false;
      return false;
    }
  },

  // 通用请求函数 - 使用uniCloud REST API
  async request(action, params){
    const url = `${this.endpoint}/database`;
    const body = {
      action: action,
      collection: params.collection,
      ...params
    };
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-uni-cloud-spaceid': this.spaceId,
        'x-uni-cloud-client-secret': this.clientSecret
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    return data;
  },

  // 查询
  async query(collection, where, limit, orderby){
    const params = {
      collection,
      field: '*',
      limit: limit || 20,
      skip: 0
    };
    if(where && Object.keys(where).length > 0){
      params.query = where;
    }
    if(orderby) params.orderby = orderby;
    const res = await this.request('select', params);
    return res;
  },

  // 添加
  async add(collection, data){
    const res = await this.request('add', {
      collection,
      data: data
    });
    return res;
  },

  // 更新
  async update(collection, where, data){
    const res = await this.request('update', {
      collection,
      query: where,
      data: data
    });
    return res;
  },

  // 按ID更新
  async updateById(collection, id, data){
    const res = await this.request('update', {
      collection,
      id: id,
      data: data
    });
    return res;
  },

  async syncConfigFromCloud(){
    if(!this.available) return false;
    try{
      const res = await this.query('nzch_config', {}, 1, '_id desc');
      if(res.data && res.data.length > 0){
        const cfg = res.data[0];
        this.configDocId = cfg._id;
        if(cfg.brand) StorageModule.saveBrand(cfg.brand);
        if(cfg.clubs) StorageModule.saveClubs(cfg.clubs);
        if(cfg.ai) {
          const localAi = StorageModule.loadAI() || {};
          StorageModule.saveAI({ ...cfg.ai, apiKey: localAi.apiKey || cfg.ai.apiKey || '' });
        }
        if(cfg.manual) StorageModule.saveManual(cfg.manual);
        if(cfg.webhook) {
          const localWh = StorageModule.loadWebhook() || {};
          StorageModule.saveWebhook({ ...localWh, ...cfg.webhook });
        }
        if(cfg.version) StorageModule.setVersion(cfg.version);
        console.log('[Cloud] 云端配置已同步到本地');
        return true;
      }
      return false;
    }catch(e){
      console.warn('[Cloud] 同步配置失败', e);
      return false;
    }
  },

  async syncConfig(){
    if(!this.available) return false;
    const config = {
      brand: StorageModule.loadBrand(),
      clubs: StorageModule.loadClubs(),
      ai: StorageModule.loadAI(),
      manual: StorageModule.loadManual(),
      webhook: StorageModule.loadWebhook(),
      version: StorageModule.getVersion(),
      updatedAt: Date.now()
    };
    try{
      if(this.configDocId){
        await this.updateById('nzch_config', this.configDocId, config);
      }else{
        const res = await this.add('nzch_config', config);
        if(res.id){
          this.configDocId = res.id;
        }
      }
      console.log('[Cloud] 本地配置已同步到云端');
      return true;
    }catch(e){
      console.warn('[Cloud] 同步配置到云端失败', e);
      return false;
    }
  },

  async getOrders(params){
    if(!this.available) return { list: StorageModule.loadOrders(), total: StorageModule.loadOrders().length };
    try{
      const res = await this.query('nzch_orders', {}, 100, 'createdAt desc');
      const list = res.data ? res.data : [];
      StorageModule.saveOrders(list);
      return { list, total: list.length };
    }catch(e){
      console.warn('[Cloud] 获取订单失败', e);
      return { list: StorageModule.loadOrders(), total: StorageModule.loadOrders().length };
    }
  },

  async createOrder(order){
    if(!this.available){
      const orders = StorageModule.loadOrders() || [];
      orders.push(order);
      StorageModule.saveOrders(orders);
      return { success: true, order };
    }
    try{
      const orderData = { ...order, createdAt: Date.now() };
      const res = await this.add('nzch_orders', orderData);
      if(res.id){
        const orders = StorageModule.loadOrders() || [];
        orders.push({ ...orderData, _id: res.id });
        StorageModule.saveOrders(orders);
        return { success: true, order: { ...orderData, _id: res.id } };
      }
      return { success: false, error: '创建失败' };
    }catch(e){
      console.warn('[Cloud] 创建订单失败', e);
      return { success: false, error: e.message };
    }
  },

  async updateOrder(orderId, updateData){
    if(!this.available){
      const orders = StorageModule.loadOrders() || [];
      const order = orders.find(o => o.orderId === orderId);
      if(order){ Object.assign(order, updateData); StorageModule.saveOrders(orders); }
      return { success: true };
    }
    try{
      const res = await this.update('nzch_orders', { orderId: orderId }, updateData);
      if(res.updated > 0){
        const orders = StorageModule.loadOrders() || [];
        const order = orders.find(o => o.orderId === orderId);
        if(order) Object.assign(order, updateData);
        StorageModule.saveOrders(orders);
        return { success: true };
      }
      return { success: false, error: '订单未找到' };
    }catch(e){
      console.warn('[Cloud] 更新订单失败', e);
      return { success: false, error: e.message };
    }
  }
};

/* ============================================================
   模块三:UI 通用工具层
   Toast 提示 / Modal 弹窗 / Tab 切换 / 确认框 / 游艇加载动画
============================================================ */
const UI = {
  // Toast 提示(success/error/info)
  toast(msg, type='info'){
    const colors = {success:'bg-green-600',error:'bg-red-500',info:'bg-deepsea',warn:'bg-orange'};
    const icon = type==='success'?'✓':type==='error'?'✕':type==='warn'?'!':'i';
    const el = document.createElement('div');
    el.className = `toast-in ${colors[type]||colors.info} text-white px-5 py-3 rounded-xl shadow-lg text-sm flex items-center gap-2 max-w-xs`;
    el.innerHTML = `<span class="font-bold w-5 h-5 rounded-full bg-white/25 flex items-center justify-center text-xs">${icon}</span><span>${msg}</span>`;
    document.getElementById('toastBox').appendChild(el);
    setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(-10px)'; setTimeout(()=>el.remove(),300); }, 2800);
  },

  // Modal 弹窗(自定义内容)
  modal(title, bodyHtml, footerHtml=''){
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" id="modalMask">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[88vh] overflow-hidden flex flex-col fade-in">
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h3 class="font-serif-display text-lg font-bold text-deepsea">${title}</h3>
            <button onclick="UI.closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
          </div>
          <div class="px-6 py-5 overflow-y-auto flex-1">${bodyHtml}</div>
          ${footerHtml?`<div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3">${footerHtml}</div>`:''}
        </div>
      </div>`;
    document.getElementById('modalMask').addEventListener('click',e=>{ if(e.target.id==='modalMask') this.closeModal(); });
  },
  closeModal(){ document.getElementById('modalRoot').innerHTML=''; },

  // 确认框
  confirm(msg, onOk){
    this.modal('请确认', `<p class="text-gray-600 leading-relaxed">${msg}</p>`,
      `<button onclick="UI.closeModal()" class="px-5 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50">取消</button>
       <button onclick="(${onOk})();UI.closeModal()" class="btn-orange px-5 py-2 rounded-lg font-medium">确定</button>`);
  },

  // 游艇航行加载动画
  yachtLoader(text='加载中'){
    return `<div class="flex flex-col items-center justify-center py-12">
      <svg width="80" height="80" viewBox="0 0 64 64" class="yacht-loader">
        <path d="M8 44 Q12 50 20 50 L44 50 Q52 50 56 44 Z" fill="#004A7C"/>
        <path d="M16 44 L20 30 L40 30 L44 44" fill="none" stroke="#D4AF37" stroke-width="2"/>
        <path d="M30 30 L30 18 L42 28 L30 28" fill="none" stroke="#004A7C" stroke-width="2"/>
        <path d="M6 52 Q16 56 32 56 T58 52" fill="none" stroke="#004A7C" stroke-width="1.5" opacity=".5"/>
      </svg>
      <p class="text-sm text-gray-500 mt-3">${text}...</p>
    </div>`;
  },

  // 移动端侧边栏开关
  toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if(!sidebar) return;
    const isOpen = sidebar.classList.contains('sidebar-open');
    if(isOpen){
      sidebar.classList.remove('sidebar-open');
      overlay.classList.remove('active');
    }else{
      sidebar.classList.add('sidebar-open');
      overlay.classList.add('active');
    }
  },
  // 侧边 Tab 切换
  switchTab(key){
    // 移动端点击后自动关闭侧边栏
    if(window.innerWidth < 768){
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if(sidebar) sidebar.classList.remove('sidebar-open');
      if(overlay) overlay.classList.remove('active');
    }
    document.querySelectorAll('#navList .nav-item').forEach(el=>el.classList.remove('active'));
    const btn = document.querySelector(`#navList [data-key="${key}"]`);
    if(btn) btn.classList.add('active');
    const area = document.getElementById('contentArea');
    area.classList.remove('fade-in'); void area.offsetWidth; area.classList.add('fade-in');
    // 路由到对应模块渲染
    const router = {
      brand: ()=>BrandModule.render(),
      clubs: ()=>ClubModule.render(),
      images: ()=>ImageModule.render(),
      ai: ()=>AIModule.render(),
      webhook: ()=>PushModule.render(),
      manual: ()=>ManualModule.render(),
      orders: ()=>OrderModule.render(),
      reset: ()=>ResetModule.render(),
    };
    (router[key]||router.brand)();
  }
};

/* ============================================================
   模块四:SyncModule 全局参数同步模块
   后台保存后刷新版本号,前端校验版本自动拉取
   支持导出全部配置为URL参数,跨设备同步
   支持 BroadcastChannel 同域双页面实时同步
============================================================ */
const SyncModule = {
  _channel: null,

  init(){
    try{
      this._channel = new BroadcastChannel('nzch_sync');
      this._channel.onmessage = (e) => {
        if(e.data && e.data.type === 'order_new'){
          console.log('[Sync] 收到新订单通知', e.data.orderId);
          if(OrderModule && typeof OrderModule.render === 'function'){
            OrderModule.render();
          }
          UI.toast('📢 收到新的预约订单!','success');
        }
      };
    }catch(e){
      console.log('[Sync] BroadcastChannel 不可用', e);
    }
  },

  broadcast(type, data){
    try{
      if(this._channel){
        this._channel.postMessage({ type, data, from: 'admin' });
      }
    }catch(e){}
  },

  // 后台保存后调用,刷新版本号并提示
  async syncToClient(){
    const v = StorageModule.bumpVersion();
    let badge = '📱 本地模式';
    if(ServerModule.available) badge = '☁ 服务器同步';
    if(CloudModule.available) badge = '☁ uniCloud云端';
    document.getElementById('versionTag').innerHTML = `数据版本 v${v} <span class="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full">${badge}</span>`;
    this.broadcast('config_update', { version: v });
    // 同步到uniCloud云端
    if(CloudModule.available){
      CloudModule.syncConfig();
      UI.toast('已保存并同步到云端','success');
    }else{
      UI.toast('已同步至客户前端,客户刷新即可看到最新数据','success');
    }
  },

  // 导出全部配置为Base64字符串(含品牌、俱乐部、图片、AI、说明书等)
  exportAllConfig(){
    const cfg = {
      v: 1,
      brand: StorageModule.loadBrand(),
      clubs: StorageModule.loadClubs(),
      ai: StorageModule.loadAI(),
      manual: StorageModule.loadManual(),
      webhook: StorageModule.loadWebhook()
    };
    const json = JSON.stringify(cfg);
    return btoa(unescape(encodeURIComponent(json)));
  },

  // 生成带完整配置的客户前端链接
  genClientLink(){
    try{
      const encoded = this.exportAllConfig();
      let baseUrl = window.location.origin + window.location.pathname;
      baseUrl = baseUrl.replace(/%E7%AE%A1%E7%90%86%E5%91%98%E5%90%8E%E5%8F%B0\.html/i, '%E5%AE%A2%E6%88%B7%E5%89%8D%E7%AB%AF.html');
      baseUrl = baseUrl.replace(/管理员后台\.html/i, '客户前端.html');
      if(baseUrl.indexOf('管理员')>-1 || baseUrl.indexOf('admin')>-1){
        const path = window.location.pathname;
        const dir = path.substring(0, path.lastIndexOf('/')+1);
        baseUrl = window.location.origin + dir + '客户前端.html';
      }
      const link = baseUrl + '?c=' + encoded;
      const sizeKB = Math.round(encoded.length / 1024);
      return {link, sizeKB};
    }catch(e){
      UI.toast('生成链接失败:'+e.message,'error');
      return null;
    }
  },

  // 显示生成客户链接弹窗
  showGenLink(){
    const result = this.genClientLink();
    if(!result) return;
    const {link, sizeKB} = result;
    let warn = '';
    if(sizeKB > 500){
      warn = `<div class="text-xs text-orange mt-2">⚠️ 配置较大(${sizeKB}KB),主要因为图片较多。如链接打不开请减少图片数量</div>`;
    }
    UI.modal('生成客户专属链接', `
      <div class="space-y-3">
        <p class="text-sm text-gray-600">把这个链接发给客户,客户打开后自动同步所有配置(品牌、码头、图片、AI等),跨设备通用。</p>
        <div class="bg-seagrad/50 rounded-lg p-3">
          <div class="text-xs text-gray-500 mb-1">客户前端链接:</div>
          <div class="text-xs text-deepsea break-all font-mono max-h-40 overflow-y-auto">${link}</div>
        </div>
        <div class="text-xs text-gray-500">配置大小: ${sizeKB} KB${warn}</div>
      </div>`,
      `<button onclick="UI.closeModal()" class="px-5 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50">关闭</button>
       <button onclick="SyncModule.copyLink()" class="btn-primary px-5 py-2 rounded-lg font-medium">复制链接</button>`);
    this._tempLink = link;
  },

  copyLink(){
    if(!this._tempLink) return;
    navigator.clipboard.writeText(this._tempLink).then(()=>{
      UI.toast('链接已复制 ✓','success');
      UI.closeModal();
    }).catch(()=>{
      UI.toast('复制失败,请手动复制','error');
    });
  },

  // 解析URL参数中的订单数据
  parseOrderFromURL(){
    try{
      const urlParams = new URLSearchParams(window.location.search);
      const orderEncoded = urlParams.get('o');
      if(!orderEncoded) return null;
      
      const json = decodeURIComponent(escape(atob(orderEncoded)));
      const data = JSON.parse(json);
      
      if(data.type === 'order' && data.order){
        return data.order;
      }
      return null;
    }catch(e){
      console.warn('解析订单链接失败', e);
      return null;
    }
  },

  // 导入订单到后台
  importOrder(order){
    try{
      const orders = StorageModule.loadOrders() || [];
      const exists = orders.find(o => o.orderId === order.orderId);
      
      if(exists){
        Object.assign(exists, order);
        UI.toast('订单已更新','success');
      }else{
        orders.push(order);
        UI.toast('新订单已导入 ✓','success');
      }
      
      StorageModule.saveOrders(orders);
      
      if(OrderModule && typeof OrderModule.render === 'function'){
        OrderModule.render();
      }
      
      return true;
    }catch(e){
      console.error('导入订单失败', e);
      UI.toast('导入失败:'+e.message,'error');
      return false;
    }
  },

  // 检查URL中是否有订单数据并自动导入
  checkAndImportOrder(){
    const order = this.parseOrderFromURL();
    if(order){
      this.importOrder(order);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }
};

/* ============================================================
   模块五:ImageModule 图片素材管理模块
   Canvas 压缩 Base64 / 上传 / 删除 / 设封面 / 预览
============================================================ */
const ImageModule = {
  // 当前正在管理图片的俱乐部 ID
  currentClubId: null,

  // 文件压缩为 Base64(maxWidth 限宽,quality 质量)
  compressImage(file, maxWidth=1280, quality=0.82){
    return new Promise((resolve,reject)=>{
      if(!file.type.startsWith('image/')){ reject(new Error('非图片文件')); return; }
      const reader = new FileReader();
      reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>{
          let {width,height} = img;
          if(width > maxWidth){ height = height * maxWidth / width; width = maxWidth; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = ()=>reject(new Error('图片加载失败'));
        img.src = e.target.result;
      };
      reader.onerror = ()=>reject(new Error('文件读取失败'));
      reader.readAsDataURL(file);
    });
  },

  // 添加图片到指定俱乐部
  async addImage(clubId, file, category='游艇实拍'){
    try{
      const base64 = await this.compressImage(file);
      const clubs = StorageModule.loadClubs();
      const club = clubs.find(c=>c.id===clubId);
      if(!club) throw new Error('俱乐部不存在');
      const isFirst = club.images.length === 0; // 首张自动设封面
      club.images.push({
        id: 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        base64, category, cover: isFirst
      });
      StorageModule.saveClubs(clubs);
      if(ServerModule.available) await ServerModule.saveClubs(clubs);
      return true;
    }catch(e){
      UI.toast('图片上传失败:'+e.message,'error');
      return false;
    }
  },

  // 删除图片
  removeImage(clubId, imgId){
    const clubs = StorageModule.loadClubs();
    const club = clubs.find(c=>c.id===clubId);
    if(!club) return;
    const wasCover = club.images.find(i=>i.id===imgId)?.cover;
    club.images = club.images.filter(i=>i.id!==imgId);
    // 若删除的是封面,自动将首张设为封面
    if(wasCover && club.images.length>0) club.images[0].cover = true;
    StorageModule.saveClubs(clubs);
    if(ServerModule.available) ServerModule.saveClubs(clubs);
  },

  // 设为封面
  setCover(clubId, imgId){
    const clubs = StorageModule.loadClubs();
    const club = clubs.find(c=>c.id===clubId);
    if(!club) return;
    club.images.forEach(i=> i.cover = (i.id===imgId));
    StorageModule.saveClubs(clubs);
    if(ServerModule.available) ServerModule.saveClubs(clubs);
  },

  // ===== 渲染:图片素材管理面板 =====
  render(){
    const clubs = StorageModule.loadClubs();
    this.currentClubId = this.currentClubId || clubs[0]?.id;
    const clubSel = clubs.map(c=>`<option value="${c.id}" ${c.id===this.currentClubId?'selected':''}>${c.name}</option>`).join('');
    const club = clubs.find(c=>c.id===this.currentClubId) || clubs[0];
    const imgs = club ? club.images : [];

    const grid = imgs.length ? imgs.map(im=>`
      <div class="relative group rounded-xl overflow-hidden border border-gray-200 ${im.cover?'cover-gold':''}">
        <img src="${im.base64}" class="w-full h-40 object-cover" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect fill=%22%23E8F1F8%22 width=%2264%22 height=%2264%22/><path d=%22M8 44 Q12 50 20 50 L44 50 Q52 50 56 44 Z%22 fill=%22%23004A7C%22/><path d=%22M16 44 L20 30 L40 30 L44 44%22 fill=%22none%22 stroke=%22%23D4AF37%22 stroke-width=%222%22/></svg>'"/>
        ${im.cover?'<span class="absolute top-2 left-2 text-xs px-2 py-0.5 rounded-full bg-gold text-deepsea font-semibold">封面</span>':''}
        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2">
          <button onclick="ImageModule.setCover('${club.id}','${im.id}');ImageModule.render()" class="text-xs px-3 py-1 rounded-full bg-gold text-deepsea font-medium">设封面</button>
          <button onclick="ImageModule.preview('${im.base64}')" class="text-xs px-3 py-1 rounded-full bg-white/90 text-deepsea font-medium">预览</button>
          <button onclick="UI.confirm('确认删除这张图片?',()=>{ImageModule.removeImage('${club.id}','${im.id}');ImageModule.render()})" class="text-xs px-3 py-1 rounded-full bg-red-500 text-white font-medium">删除</button>
        </div>
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent px-3 py-1 text-xs text-white">${im.category}</div>
      </div>`).join('') : `<div class="col-span-full text-center py-12 text-gray-400">该码头暂无图片,点击下方上传按钮添加</div>`;

    document.getElementById('contentArea').innerHTML = `
      <div class="mb-5">
        <h2 class="font-serif-display text-2xl font-bold text-deepsea">图片素材管理</h2>
        <p class="text-sm text-gray-500 mt-1">为每个码头上传/管理游艇、码头、内饰高清实拍图,支持设封面、预览、删除,保存后同步前端轮播。</p>
      </div>
      <div class="bg-white card-soft p-5 mb-5">
        <div class="flex flex-wrap items-end gap-4">
          <div class="flex-1 min-w-[200px]">
            <label class="block text-sm font-medium text-gray-700 mb-1">选择码头</label>
            <select id="imgClubSel" class="input-soft" onchange="ImageModule.currentClubId=this.value;ImageModule.render()">${clubSel}</select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">图片分类</label>
            <select id="imgCategory" class="input-soft">
              <option>码头实景</option><option>游艇实拍</option><option>航线风景</option>
              <option>内饰图</option><option>宣传海报</option>
            </select>
          </div>
          <label class="btn-orange px-5 py-2.5 rounded-lg font-medium cursor-pointer flex items-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            上传图片
            <input type="file" accept="image/*" multiple class="hidden" onchange="ImageModule.handleUpload(this)"/>
          </label>
        </div>
        <p class="text-xs text-gray-400 mt-2">支持多选上传,自动压缩为 Base64 存入本地。首张上传自动设为封面。</p>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">${grid}</div>`;
  },

  // 处理多文件上传
  async handleUpload(input){
    const files = Array.from(input.files);
    if(!files.length) return;
    const category = document.getElementById('imgCategory').value;
    UI.toast(`正在上传 ${files.length} 张图片...`,'info');
    for(const f of files){ await ImageModule.addImage(ImageModule.currentClubId, f, category); }
    input.value = '';
    ImageModule.render();
    SyncModule.syncToClient();
    UI.toast(`成功上传 ${files.length} 张图片`,'success');
  },

  // 图片预览大图
  preview(base64){
    UI.modal('图片预览', `<img src="${base64}" class="w-full rounded-xl" onerror="this.alt='图片加载失败'"/>`,
      `<button onclick="UI.closeModal()" class="btn-primary px-5 py-2 rounded-lg">关闭</button>`);
  }
};

  // 动态添加一行
  addRow(boxId, type){
    const box = document.getElementById(boxId);
    const row = document.createElement('div');
    row.className = 'flex gap-2 items-center';
    if(type==='price') row.innerHTML = `<input class="input-soft psize" placeholder="船型"/><input class="input-soft pprice" type="number" placeholder="价格"/><button onclick="this.parentElement.remove()" class="text-red-500 text-sm">删</button>`;
    else if(type==='addon') row.innerHTML = `<input class="input-soft aname" placeholder="服务名"/><input class="input-soft aprice" type="number" placeholder="价格"/><button onclick="this.parentElement.remove()" class="text-red-500 text-sm">删</button>`;
    else if(type==='slot') row.innerHTML = `<input class="input-soft slot" placeholder="如 09:00-12:00"/><button onclick="this.parentElement.remove()" class="text-red-500 text-sm">删</button>`;
    else if(type==='fac') row.innerHTML = `<input class="input-soft fac" placeholder="如 泊位120个"/><button onclick="this.parentElement.remove()" class="text-red-500 text-sm">删</button>`;
    box.appendChild(row);
  },

  // 保存编辑
  async save(id){
    const clubs = StorageModule.loadClubs();
    const c = clubs.find(x=>x.id===id);
    if(!c){ UI.closeModal(); return; }
    c.name = document.getElementById('cName').value.trim();
    c.area = document.getElementById('cArea').value;
    c.address = document.getElementById('cAddr').value.trim();
    c.route = document.getElementById('cRoute').value.trim();
    c.intro = document.getElementById('cIntro').value.trim();
    c.maxPax = Number(document.getElementById('cMax').value)||30;
    c.active = document.getElementById('cActive').value==='true';
    c.refundRule = document.getElementById('cRefund').value.trim();
    c.timeSlots = Array.from(document.querySelectorAll('#slotBox .slot')).map(i=>i.value.trim()).filter(Boolean);
    c.facilities = Array.from(document.querySelectorAll('#facBox .fac')).map(i=>i.value.trim()).filter(Boolean);
    c.pricing = Array.from(document.querySelectorAll('#priceBox [data-prow],#priceBox .flex')).map(r=>{
      const s=r.querySelector('.psize')?.value.trim(), p=Number(r.querySelector('.pprice')?.value);
      return s&&p?{size:s,price:p}:null;
    }).filter(Boolean);
    c.addons = Array.from(document.querySelectorAll('#addonBox [data-arow],#addonBox .flex')).map(r=>{
      const n=r.querySelector('.aname')?.value.trim(), p=Number(r.querySelector('.aprice')?.value);
      return n&&p?{name:n,price:p}:null;
    }).filter(Boolean);
    StorageModule.saveClubs(clubs);
    SyncModule.syncToClient();
    if(ServerModule.available) await ServerModule.saveClubs(clubs);
    UI.closeModal();
    this.render();
    UI.toast('码头配置已保存'+(ServerModule.available?'并同步到服务器':''),'success');
  },

  // 启用/停用
  async toggle(id){
    const clubs = StorageModule.loadClubs();
    const c = clubs.find(x=>x.id===id);
    c.active = !c.active;
    StorageModule.saveClubs(clubs);
    SyncModule.syncToClient();
    if(ServerModule.available) await ServerModule.saveClubs(clubs);
    this.render();
    UI.toast(`${c.name} 已${c.active?'启用':'停用'}`,'success');
  },

  // 删除码头
  async remove(id){
    let clubs = StorageModule.loadClubs();
    clubs = clubs.filter(c=>c.id!==id);
    StorageModule.saveClubs(clubs);
    SyncModule.syncToClient();
    if(ServerModule.available) await ServerModule.saveClubs(clubs);
    UI.closeModal();
    this.render();
    UI.toast('码头已删除','success');
  }
};

  switchPlatform(platform){

      siliconflow: {
        url: 'https://api.siliconflow.cn/v1/chat/completions',
        model: 'Qwen/Qwen2.5-7B-Instruct',

      zhipu: {
        url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
        model: 'glm-4-flash',
        tip: '智谱AI - glm-4-flash免费'
      },
      kimi: {
        url: 'https://api.moonshot.cn/v1/chat/completions',
        model: 'moonshot-v1-8k',
        tip: 'Kimi - 月之暗面'
      },
      deepseek: {
        url: 'https://api.deepseek.com/v1/chat/completions',
        model: 'deepseek-chat',
        tip: 'DeepSeek - 深度求索'
      }
    };
    const p = platforms[platform];
    if(!p) return;
    document.getElementById('aUrl').value = p.url;
    document.getElementById('aModel').value = p.model;
    UI.toast('已切换到'+p.tip,'success');
  },

  async save(){
    const a = {
      apiUrl: document.getElementById('aUrl').value.trim(),
      apiKey: document.getElementById('aKey').value.trim(),
      model: document.getElementById('aModel').value.trim(),
      systemPrompt: document.getElementById('aPrompt').value.trim(),
      quickQuestions: Array.from(document.querySelectorAll('#qqBox .qq')).map(i=>i.value.trim()).filter(Boolean)
    };
    if(!a.apiUrl){ UI.toast('接口地址必填','error'); return; }
    StorageModule.saveAI(a);
    SyncModule.syncToClient();
    if(ServerModule.available) await ServerModule.saveAI(a);
    UI.toast('AI配置已保存'+(ServerModule.available?'并同步到服务器':''),'success');
  },

  // 测试AI连接(调用统一请求函数)
  async test(){
    const cfg = {
      apiUrl: document.getElementById('aUrl').value.trim(),
      apiKey: document.getElementById('aKey').value.trim(),
      model: document.getElementById('aModel').value.trim(),
    };
    if(!cfg.apiKey){ UI.toast('请先填写API密钥','error'); return; }
    UI.toast('正在测试AI连接...','info');
    try{
      const res = await fetch(cfg.apiUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.apiKey}`},
        body: JSON.stringify({
          model: cfg.model,
          messages:[{role:'user',content:'你好,请回复「南崽出海AI连接成功」'}],
          max_tokens: 50
        })
      });
      if(!res.ok){
        if(res.status===401) UI.toast('密钥失效(401),请检查API Key','error');
        else if(res.status===429) UI.toast('接口限流(429),请稍后再试','error');
        else UI.toast(`请求失败(${res.status})`,'error');
        return;
      }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '无返回内容';
      UI.modal('AI连接测试成功', `<div class="bg-seagrad p-4 rounded-xl text-sm text-deepsea">${reply}</div>`,
        `<button onclick="UI.closeModal()" class="btn-primary px-5 py-2 rounded-lg">好的</button>`);
    }catch(e){
      UI.toast('网络异常:'+e.message,'error');
    }
  }
};

  genLink(){
    const cfg = StorageModule.loadWebhook();
    if(!cfg || (cfg.type==='pushplus' && !cfg.token) || (cfg.type==='wecom' && !cfg.url)){
      UI.toast('请先配置好推送信息并保存','error');
      return;
    }
    // 生成客户前端链接,使用查询参数缩短长度
    // 自动检测当前页面路径,替换管理员后台为客户前端
    let baseUrl = window.location.origin + window.location.pathname;
    // 处理中文文件名的URL编码和普通名称
    baseUrl = baseUrl.replace(/%E7%AE%A1%E7%90%86%E5%91%98%E5%90%8E%E5%8F%B0\.html/i, '%E5%AE%A2%E6%88%B7%E5%89%8D%E7%AB%AF.html');
    baseUrl = baseUrl.replace(/管理员后台\.html/i, '客户前端.html');
    // 如果没替换成功(可能在本地或路径不同),用GitHub Pages地址兜底
    if(baseUrl.indexOf('管理员')>-1 || baseUrl.indexOf('admin')>-1 || baseUrl === window.location.origin + window.location.pathname){
      // 尝试从已知路径推断
      const path = window.location.pathname;
      const dir = path.substring(0, path.lastIndexOf('/')+1);
      baseUrl = window.location.origin + dir + '客户前端.html';
    }

    let link;
    if(cfg.type==='pushplus' && cfg.token){
      link = baseUrl + '?t=' + encodeURIComponent(cfg.token);
    }else{
      // 企业微信模式内容较长,用base64
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
      link = baseUrl + '?w=' + encoded;
    }

    document.getElementById('linkText').textContent = link;
    document.getElementById('linkBox').classList.remove('hidden');
    UI.toast('链接已生成,复制发给客户即可','success');
  },

  async sendOrderPush(order){
    const cfg = StorageModule.loadWebhook() || {type:'pushplus', token:'', url:'', useProxy:false};
    const b = StorageModule.loadBrand() || DefaultDataModule.brand();
    const type = cfg.type || 'pushplus';
    if(!cfg.token && !cfg.url){
      console.warn('[Push] 未配置推送信息');
      return false;
    }

    const content = `【南崽出海·新游艇预约通知】
订单编号：${order.orderId}
预约码头：${order.clubName}
码头地址：${order.clubAddress}
客户姓名：${order.customerName}
联系电话：${order.customerPhone}
选定游艇：${order.boatSize}
出海日期&时段：${order.bookingDate} ${order.timeSlot}
出行人数：${order.pax}
增值配套：${(order.addons||[]).join('、')||'无'}
客户出行备注：${order.remark||'无'}
商家对接：微信${b.wechat} / 电话${b.phone}
提交时间：${new Date(order.createdAt).toLocaleString('zh-CN')}
请尽快联系客户确认档期！`;

    const title = order.status === 'pending' ? '【南崽出海】新游艇预约通知' : '【南崽出海】预约已确认通知';

    // 最多重试3次
    const maxRetries = 3;
    let lastError = '';

    for(let attempt=1; attempt<=maxRetries; attempt++){
      try{
        let ok = false;
        if(type==='pushplus'){
          if(!cfg.token) return false;
          // 备用域名
          const domains = ['https://www.pushplus.plus/send', 'https://pushplus.plus/send', 'https://pushplus.hxtrip.com/send'];
          const domain = domains[(attempt-1) % domains.length];
          const res = await fetch(domain, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              token: cfg.token,
              title: title,
              content: content,
              template: 'txt'
            })
          });
          const data = await res.json();
          if(data.code===200) ok = true;
          else lastError = data.msg || `错误码${data.code}`;
        }else{
          if(!cfg.url) return false;
          const body = JSON.stringify({ msgtype:'text', text:{ content: content } });
          let res;
          if(cfg.useProxy){
            // 多个代理备用
            const proxies = [
              'https://api.allorigins.win/post?url=',
              'https://corsproxy.io/?'
            ];
            const proxy = proxies[(attempt-1) % proxies.length];
            res = await fetch(proxy + encodeURIComponent(cfg.url), {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body
            });
            const data = await res.json();
            const result = data.contents ? JSON.parse(data.contents) : data;
            if(result.errcode===0) ok = true;
            else lastError = result.errmsg || '推送失败';
          }else{
            res = await fetch(cfg.url, {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body
            });
            const data = await res.json();
            if(data.errcode===0) ok = true;
            else lastError = data.errmsg || '推送失败';
          }
        }
        if(ok){
          console.log(`[Push] 第${attempt}次推送成功`);
          return true;
        }
      }catch(e){
        lastError = e.message;
        console.warn(`[Push] 第${attempt}次推送失败:`, e);
      }
      // 重试间隔
      if(attempt < maxRetries){
        await new Promise(r => setTimeout(r, attempt * 1000));
      }
    }
    console.error('[Push] 推送全部失败,最后错误:', lastError);
    return false;
  },

  // 诊断推送配置
  async diagnose(){
    const cfg = StorageModule.loadWebhook() || {};
    const type = cfg.type || 'pushplus';
    const results = [];

    results.push({name:'推送方式', value: type==='pushplus'?'PushPlus':'企业微信', ok:true});

    if(type==='pushplus'){
      if(!cfg.token){
        results.push({name:'Token配置', value:'未配置', ok:false});
        return results;
      }
      results.push({name:'Token长度', value:cfg.token.length+'字符', ok: cfg.token.length > 20});
      // 测试连通性
      try{
        const res = await fetch('https://www.pushplus.plus/send', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            token: cfg.token,
            title: '【南崽出海】连通性测试',
            content: '这是一条测试消息，用于检测PushPlus连通性。',
            template: 'txt'
          })
        });
        const data = await res.json();
        results.push({name:'API连通', value: data.code===200?'成功':'失败', ok: data.code===200});
        if(data.code!==200){
          results.push({name:'错误信息', value: data.msg || '未知错误', ok:false});
          if(data.code===401 || data.msg?.includes('token')){
            results.push({name:'建议', value:'请检查Token是否正确，注意是「用户Token」而非「消息Token」', ok:false});
          }
        }
      }catch(e){
        results.push({name:'网络连通', value:'失败: '+e.message, ok:false});
        results.push({name:'建议', value:'请检查网络连接，或尝试更换推送方式', ok:false});
      }
    }else{
      if(!cfg.url){
        results.push({name:'Webhook配置', value:'未配置', ok:false});
        return results;
      }
      results.push({name:'URL格式', value: cfg.url.includes('qyapi.weixin.qq.com')?'正确':'错误', ok: cfg.url.includes('qyapi.weixin.qq.com')});
      results.push({name:'代理模式', value: cfg.useProxy?'已启用(推荐)':'未启用', ok: cfg.useProxy});
    }

    return results;
  }
};

          <label class="btn-orange text-xs px-3 py-1.5 rounded-lg cursor-pointer">

          </label>
          ${ch.image?`<button onclick="ManualModule.removeImg('${ch.id}')" class="text-xs text-red-500">移除</button>`:''}
        </div>
      </div>`).join('');

    document.getElementById('contentArea').innerHTML = `
      <div class="mb-5 flex justify-between items-center">
        <div>
          <h2 class="font-serif-display text-2xl font-bold text-deepsea">使用说明书编辑器</h2>
          <p class="text-sm text-gray-500 mt-1">编辑前端内置帮助弹窗的章节内容与示意图,支持增删排序,保存后同步前端。</p>
        </div>
        <button onclick="ManualModule.add()" class="btn-orange px-5 py-2.5 rounded-lg font-medium">+ 新增章节</button>
      </div>
      <div class="space-y-3">${chapters}</div>
      <div class="mt-5 flex justify-end">
        <button onclick="ManualModule.saveAll()" class="btn-primary px-8 py-2.5 rounded-lg font-medium">保存全部并同步</button>
      </div>`;
  },

  add(){
    const list = StorageModule.loadManual();
    list.push({id:'m_'+Date.now(), title:'新章节', content:'', image:''});
    StorageModule.saveManual(list);
    if(ServerModule.available) ServerModule.saveManual(list);
    this.render();
  },

  move(id, dir){
    const list = StorageModule.loadManual();
    const i = list.findIndex(c=>c.id===id);
    const j = i + dir;
    if(j<0 || j>=list.length) return;
    [list[i],list[j]] = [list[j],list[i]];
    StorageModule.saveManual(list);
    if(ServerModule.available) ServerModule.saveManual(list);
    this.render();
  },

  remove(id){
    let list = StorageModule.loadManual();
    list = list.filter(c=>c.id!==id);
    StorageModule.saveManual(list);
    SyncModule.syncToClient();
    if(ServerModule.available) ServerModule.saveManual(list);
    this.render();
    UI.toast('章节已删除','success');
  },

  async uploadImg(id, input){
    const f = input.files[0]; if(!f) return;
    const base64 = await ImageModule.compressImage(f, 1000, 0.8);
    const list = StorageModule.loadManual();
    const ch = list.find(c=>c.id===id);
    ch.image = base64;
    StorageModule.saveManual(list);
    if(ServerModule.available) await ServerModule.saveManual(list);
    ManualModule.render();
  },

  removeImg(id){
    const list = StorageModule.loadManual();
    list.find(c=>c.id===id).image = '';
    StorageModule.saveManual(list);
    if(ServerModule.available) ServerModule.saveManual(list);
    ManualModule.render();
  },

  async saveAll(){
    const list = StorageModule.loadManual();
    document.querySelectorAll('[data-mid]').forEach(el=>{
      const id = el.dataset.mid;
      const ch = list.find(c=>c.id===id);
      if(ch){
        ch.title = el.querySelector('.mtitle').value.trim() || '未命名章节';
        ch.content = el.querySelector('.mcontent').value.trim();
      }
    });
    StorageModule.saveManual(list);
    SyncModule.syncToClient();
    if(ServerModule.available) await ServerModule.saveManual(list);
    UI.toast('说明书已保存'+(ServerModule.available?'并同步到服务器':''),'success');
  }
};

          <div><span class="text-xs text-gray-500">电话</span><br/><span class="text-xs">${o.customerPhone}</span></div>
        </div>
        <div class="text-xs text-gray-500 mb-2">${o.bookingDate} ${o.timeSlot}</div>
        <div class="flex gap-2">
          <button onclick="OrderModule.detail('${o.orderId}')" class="flex-1 text-xs py-1.5 rounded bg-deepsea text-white">详情</button>
          <select onchange="OrderModule.setStatus('${o.orderId}',this.value)" class="flex-1 text-xs px-2 py-1 rounded border text-gray-600">
            ${['pending','done','cancel'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s==='pending'?'待确认':s==='done'?'已成交':'已取消'}</option>`).join('')}
          </select>
        </div>
      </div>`}).join('') : `<div class="text-center py-12 text-gray-400 bg-white card-soft">暂无订单数据</div>`;

    const cloudStatus = CloudModule.available 
      ? '<span class="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full">☁ 云端已连接</span>'
      : '<span class="text-xs text-orange-600 bg-orange-50 px-2 py-0.5 rounded-full">📱 本地模式</span>';
    
    document.getElementById('contentArea').innerHTML = `
      <div class="mb-4 md:mb-5 flex items-center justify-between">
        <div>
          <h2 class="font-serif-display text-xl md:text-2xl font-bold text-deepsea">预约订单台账</h2>
          <p class="text-xs md:text-sm text-gray-500 mt-1">共 ${orders.length} 单 ${cloudStatus}</p>
        </div>
        <div class="flex gap-2">
          <button onclick="OrderModule.render()" class="btn-primary px-3 py-2 rounded-lg text-xs">🔄 刷新</button>
          <button onclick="CloudModule.init().then(ok=>{if(ok){OrderModule.render();UI.toast('云端连接成功','success')}else{UI.toast('云端连接失败','error')}})" class="btn-gold px-3 py-2 rounded-lg text-xs">${CloudModule.available?'重新连接':'连接云端'}</button>
        </div>
      </div>
      <div class="bg-white card-soft p-3 md:p-4 mb-4 flex flex-col sm:flex-row gap-3 sm:gap-4">
        <div class="flex-1"><label class="text-xs text-gray-500">筛选码头</label>
          <select id="fClub" class="input-soft mt-1 text-sm" onchange="OrderModule.filter.club=this.value;OrderModule.render()">${clubOpts}</select>
        </div>
        <div class="flex-1"><label class="text-xs text-gray-500">筛选状态</label>
          <select id="fStatus" class="input-soft mt-1 text-sm" onchange="OrderModule.filter.status=this.value;OrderModule.render()">${statusOpts}</select>
        </div>
        <button onclick="OrderModule.exportJson()" class="btn-gold px-4 py-2 rounded-lg text-xs sm:text-sm sm:ml-auto self-end">导出备份</button>
      </div>
      <div class="hidden md:block bg-white card-soft overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-seagrad text-xs text-deepsea uppercase">
            <tr>
              <th class="px-3 py-3">订单编号</th><th class="px-3 py-3">码头</th>
              <th class="px-3 py-3">客户</th><th class="px-3 py-3">船型/时段</th>
              <th class="px-3 py-3">人数</th><th class="px-3 py-3">状态</th>
              <th class="px-3 py-3">提交时间</th><th class="px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="md:hidden">${orderCards}</div>`;
  },

  // 详情弹窗
  detail(orderId){
    const o = StorageModule.loadOrders().find(x=>x.orderId===orderId);
    if(!o) return;
    const b = StorageModule.loadBrand();
    UI.modal(`订单详情 · ${o.orderId}`, `
      <div class="space-y-2 text-sm">
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">码头</span><span class="col-span-2">${o.clubName}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">地址</span><span class="col-span-2">${o.clubAddress}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">客户</span><span class="col-span-2">${o.customerName}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">电话</span><span class="col-span-2">${o.customerPhone}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">船型</span><span class="col-span-2">${o.boatSize}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">日期时段</span><span class="col-span-2">${o.bookingDate} ${o.timeSlot}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">人数</span><span class="col-span-2">${o.pax}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">增值配套</span><span class="col-span-2">${(o.addons||[]).join('、')||'无'}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">备注</span><span class="col-span-2">${o.remark||'无'}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">商家对接</span><span class="col-span-2">微信${b.wechat} / 电话${b.phone}</span></div>
        <div class="grid grid-cols-3 gap-2"><span class="text-gray-500">提交时间</span><span class="col-span-2">${new Date(o.createdAt).toLocaleString('zh-CN')}</span></div>
      </div>`,
      `<button onclick="UI.closeModal()" class="btn-primary px-5 py-2 rounded-lg">关闭</button>`);
  },

  async setStatus(orderId, status){
    const orders = StorageModule.loadOrders();
    const o = orders.find(x=>x.orderId===orderId);
    if(!o) return;
    
    const oldStatus = o.status;
    o.status = status;
    StorageModule.saveOrders(orders);
    
    if(ServerModule.available){
      await ServerModule.updateOrderStatus(orderId, status);
    }
    if(CloudModule.available){
      await CloudModule.updateOrder(orderId, { status });
    }
    
    this.render();
    
    if(oldStatus==='pending' && status==='done'){
      UI.toast('正在推送微信通知...','info');
      let ok = false;
      if(ServerModule.available){
        const res = await ServerModule.pushOrder(o);
        ok = res.success;
      }else{
        ok = await PushModule.sendOrderPush(o);
      }
      if(ok) UI.toast('订单已确认,微信通知已发送 ✓','success');
      else UI.toast('订单已确认,但推送失败','warn');
    }else{
      UI.toast('订单状态已更新','success');
    }
  },

  // 导出JSON备份
  exportJson(){
    const orders = StorageModule.loadOrders();
    const blob = new Blob([JSON.stringify(orders,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `南崽出海_订单备份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    UI.toast('订单备份已导出','success');
  }
};

          </div>

      </div>`;
  },

  resetOrders(){
    StorageModule.saveOrders([]);
    this.render();
    UI.toast('订单数据已清空','success');
  },

  resetClubs(){
    StorageModule.saveClubs(DefaultDataModule.clubs());
    SyncModule.syncToClient();
    this.render();
    UI.toast('俱乐部已重置为默认数据','success');
  },

  confirmAll(){
    UI.modal('最终确认 · 全部清空', `
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
        <p class="font-bold mb-2">⚠ 危险操作</p>
        <p>将清空以下全部数据,且不可恢复:</p>

          <li>品牌商家配置(含微信DaogoG、电话13003192344)</li>
          <li>五大俱乐部完整数据(含全部图片素材)</li>
          <li>AI接口参数与角色提示词</li>
          <li>企业微信Webhook链接</li>

          <li>全部预约订单台账</li>
        </ul>
        <p class="mt-3">清空后系统将自动恢复内置默认配置。</p>
      </div>
      <div class="mt-4">

  },

  doAll(){
    const txt = document.getElementById('resetConfirm').value.trim();

    Object.values(StorageModule.KEYS).forEach(k=>StorageModule.remove(k));
    DefaultDataModule.initAll();
    UI.closeModal();
    document.getElementById('versionTag').textContent = `数据版本 v${StorageModule.getVersion()}`;

async function initApp(){
  // 初始化默认数据
  DefaultDataModule.initAll();
  // 初始化同步通道
  SyncModule.init();
  // 检查URL中是否有订单数据并导入
  SyncModule.checkAndImportOrder();
  // 尝试连接后端服务
  await ServerModule.init();
  // 尝试连接uniCloud云端
  await CloudModule.init();
  // 渲染侧边导航
  document.getElementById('navList').innerHTML = NAV_ITEMS.map(it=>`
    <button data-key="${it.key}" onclick="UI.switchTab('${it.key}')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-gray-600 hover:bg-seagrad/60 transition text-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${it.icon}"/></svg>
      ${it.label}
    </button>`).join('');
  // 版本号 & 服务器状态
  let serverBadge = '<span class="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full">📱 本地模式</span>';
  if(ServerModule.available) serverBadge = '<span class="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full">☁ 服务器同步</span>';
  if(CloudModule.available) serverBadge = '<span class="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full">☁ uniCloud云端</span>';
  document.getElementById('versionTag').innerHTML = `数据版本 v${StorageModule.getVersion()} ${serverBadge}`;
  // 进入品牌配置
  UI.switchTab('brand');
}

// 启动
initApp();
